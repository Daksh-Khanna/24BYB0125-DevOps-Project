server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Used by Nagios check_http
    location = /health.html {
        access_log off;
    }

    # Used by monitoring agents (e.g. nginx-prometheus-exporter / statsd
    # scripts) to feed request/connection counts into Graphite.
    location = /nginx_status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }
}
