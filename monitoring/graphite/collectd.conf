# ---- collectd config snippet: send infra metrics to Graphite/Carbon ----
# Install collectd on the host running Docker/Kubernetes nodes.
# Append this block to /etc/collectd/collectd.conf

LoadPlugin cpu
LoadPlugin memory
LoadPlugin disk
LoadPlugin interface
LoadPlugin write_graphite

<Plugin write_graphite>
  <Node "graphite_server">
    Host "127.0.0.1"          # Graphite/Carbon server address
    Port "2003"               # Carbon plaintext receiver port
    Protocol "tcp"
    LogSendErrors true
    Prefix "portfolio."
    StoreRates true
    AlwaysAppendDS false
    EscapeCharacter "_"
  </Node>
</Plugin>
